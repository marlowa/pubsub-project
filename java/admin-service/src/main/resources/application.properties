db.url=jdbc:postgresql://localhost:5432/pubsub
db.username=pubsub_app
db.password=pubsub_dev
db.table-prefix=pubsub_

# Set to false when the auth service is not running (e.g. during DB-only development)
auth-service.enabled=true
auth-service.host=127.0.0.1
auth-service.admin-port=7072

server.port=8080

# Path to the admin UI user store file (created on first run).
# Relative paths are resolved against the working directory.
admin.users-file=admin_users.toml

# Branding — all optional.
# brand.name:     product name shown in page titles and the nav header.
# brand.logo-url: URL of a logo image shown in the nav header and login page.
#                 May be an absolute intranet URL or a relative path under /static/.
# brand.css-file: filesystem path to a CSS file whose content is inlined into every page.
#                 Use to override pico.css custom properties, e.g.:
#                   :root { --pico-primary: #003087; --pico-primary-hover: #00205b; }
brand.name=PubSub Admin
brand.logo-url=
brand.css-file=
