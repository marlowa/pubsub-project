<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIX Test Client — Script</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="content">
    <h1>Script</h1>
    <hr class="section-rule">

    <div style="display:flex; gap:20px; margin-bottom:12px; align-items:baseline;">
        <span>State: <span id="state-badge" class="state-badge state-idle">○ IDLE</span></span>
        <span>Capture: <span id="capture-badge">○ NOT CAPTURING</span></span>
    </div>

    <div class="form-row" style="margin-bottom:10px;">
        <input type="text" id="script-filename" value="untitled.groovy" style="width:240px;">
        <input type="file" id="file-picker" accept=".groovy,.txt,text/*" style="display:none;"
               onchange="onFilePicked(this)">
        <button onclick="document.getElementById('file-picker').click()">Load</button>
        <button onclick="doSave()">Save</button>
        <button onclick="doNew()">New</button>
    </div>

    <textarea id="script-editor" spellcheck="false"></textarea>

    <div style="display:flex; gap:10px; margin-top:10px; margin-bottom:20px;">
        <button id="btn-run" onclick="doRun()">Run</button>
        <button id="btn-stop" onclick="doStop()" disabled>Stop</button>
    </div>

    <div style="font-weight:bold; margin-bottom:4px;">Output</div>
    <hr class="section-rule">
    <pre id="script-output"></pre>

</div>

<script src="/app.js"></script>
<script>
'use strict';

let lastState = 'IDLE';

function updateStateBadge(state, errorMessage) {
    const badge = document.getElementById('state-badge');
    const runBtn = document.getElementById('btn-run');
    const stopBtn = document.getElementById('btn-stop');

    badge.className = 'state-badge state-' + state.toLowerCase();
    switch (state) {
        case 'IDLE':
            badge.textContent = '○ IDLE';
            runBtn.disabled = false;
            stopBtn.disabled = true;
            break;
        case 'RUNNING':
            badge.textContent = '● RUNNING';
            runBtn.disabled = true;
            stopBtn.disabled = false;
            break;
        case 'COMPLETED':
            badge.textContent = '● COMPLETED';
            runBtn.disabled = false;
            stopBtn.disabled = true;
            break;
        case 'FAILED':
            badge.textContent = '✗ FAILED — ' + (errorMessage || '');
            runBtn.disabled = false;
            stopBtn.disabled = true;
            break;
    }
}

async function pollState() {
    try {
        const data = await apiGet('/api/script');
        if (data.state !== lastState) {
            lastState = data.state;
            updateStateBadge(data.state, data.errorMessage);
        }
        document.getElementById('script-output').textContent = data.output || '';

        if (data.content && document.getElementById('script-editor').value === '') {
            document.getElementById('script-editor').value = data.content;
        }
        if (data.filename) {
            document.getElementById('script-filename').value = data.filename;
        }
    } catch (e) {
        // ignore during startup
    }
    setTimeout(pollState, 1500);
}

async function doRun() {
    const content = document.getElementById('script-editor').value;
    await apiPost('/api/script/run', { content });
}

async function doStop() {
    await apiPost('/api/script/stop', {});
}

function doNew() {
    document.getElementById('script-editor').value = '';
    document.getElementById('script-filename').value = 'untitled.groovy';
}

async function doSave() {
    const filename = document.getElementById('script-filename').value;
    const content = document.getElementById('script-editor').value;
    await apiPost('/api/scripts/save', { filename, content });
}

function onFilePicked(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById('script-editor').value = e.target.result;
        document.getElementById('script-filename').value = file.name;
    };
    reader.readAsText(file);
    // Reset so picking the same file again still fires onchange.
    input.value = '';
}

function pageInit() {
    pollState();
}
</script>
</body>
</html>
