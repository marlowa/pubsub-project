<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIX Test Client — Messages</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="content">
    <h1>Messages</h1>
    <hr class="section-rule">

    <div style="font-weight:bold; margin-bottom:6px;">New Order Single</div>
    <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; margin-bottom:14px;">
        <label>ClOrdID <input type="text" id="f-clordid" value="ORD-001" style="width:110px;"></label>
        <label>Symbol  <input type="text" id="f-symbol"  value="BHP"    style="width:80px;"></label>
        <label>Side
            <select id="f-side" style="font-family:monospace; font-size:13px; padding:4px 6px; border:1px solid #aaa;">
                <option value="Buy">Buy</option>
                <option value="Sell">Sell</option>
                <option value="Sell Short">Sell Short</option>
            </select>
        </label>
        <label>OrdType
            <select id="f-ordtype" style="font-family:monospace; font-size:13px; padding:4px 6px; border:1px solid #aaa;">
                <option value="Limit">Limit</option>
                <option value="Market">Market</option>
            </select>
        </label>
        <label>Qty   <input type="number" id="f-qty"   value="100"   style="width:80px;"></label>
        <label>Price <input type="number" id="f-price" value="10.50" step="0.01" style="width:90px;"></label>
        <button id="btn-send" onclick="doSend()" disabled>Send</button>
    </div>

    <div id="send-error" style="color:#c00; margin-bottom:8px; display:none;"></div>

    <hr class="section-rule">
    <div style="font-weight:bold; margin-bottom:6px;">Order Cancel Request</div>
    <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; margin-bottom:14px;">
        <label>OrigClOrdID <input type="text" id="c-origclordid" style="width:130px;"></label>
        <label>Symbol  <input type="text" id="c-symbol"    style="width:80px;"></label>
        <label>Side
            <select id="c-side" style="font-family:monospace; font-size:13px; padding:4px 6px; border:1px solid #aaa;">
                <option value="Buy">Buy</option>
                <option value="Sell">Sell</option>
                <option value="Sell Short">Sell Short</option>
            </select>
        </label>
        <label>Qty <input type="number" id="c-qty" style="width:80px;"></label>
        <button id="btn-send-cancel" onclick="doCancel()" disabled>Send Cancel</button>
    </div>
    <div id="cancel-error" style="color:#c00; margin-bottom:8px; display:none;"></div>

    <!-- Blotter -->
    <div style="display:flex; align-items:center; gap:12px; margin-top:16px; margin-bottom:4px;">
        <span style="font-weight:bold;">Blotter</span>
        <button onclick="doClear()" style="font-size:11px; padding:2px 8px;">Clear</button>
    </div>
    <div id="blotter-wrap">
        <table id="blotter">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Dir</th>
                    <th>Seq</th>
                    <th>ClOrdID</th>
                    <th>OrigClOrdID</th>
                    <th>OrderID</th>
                    <th>ExecID</th>
                    <th>ExecType</th>
                    <th>OrdStatus</th>
                    <th>Reason</th>
                    <th>Symbol</th>
                    <th>Side</th>
                    <th>OrdQty</th>
                    <th>Price</th>
                    <th>OrdType</th>
                    <th>CumQty</th>
                    <th>LeavesQty</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="blotter-body"></tbody>
        </table>
    </div>
</div>

<script src="/app.js"></script>
<script>
'use strict';

let lastBlotterSize = 0;

const ORD_STATUS_CLASS = {
    '2': 'status-filled',
    '1': 'status-partial',
    '8': 'status-rejected',
    '4': 'status-cancelled',
};

const EXEC_TYPE_LABEL = {
    '0': 'New', '3': 'DoneForDay', '4': 'Canceled', '5': 'Replaced',
    '6': 'PendingCancel', '7': 'Stopped', '8': 'Rejected', '9': 'Suspended',
    'A': 'PendingNew', 'B': 'Calculated', 'C': 'Expired', 'D': 'Restated',
    'E': 'PendingReplace', 'F': 'Trade', 'G': 'TradeCorrect', 'H': 'TradeCancel',
    'I': 'OrderStatus',
};

const ORD_STATUS_LABEL = {
    '0': 'New', '1': 'PartialFill', '2': 'Filled', '3': 'DoneForDay',
    '4': 'Canceled', '5': 'Replaced', '6': 'PendingCancel', '7': 'Stopped',
    '8': 'Rejected', '9': 'Suspended', 'A': 'PendingNew', 'B': 'Calculated',
    'C': 'Expired', 'D': 'AcceptedForBidding', 'E': 'PendingReplace',
};

const TERMINAL_ORD_STATUSES = new Set(['2', '4', '8', '3', 'C']);

function isOrderTerminal(rows, clOrdId) {
    return rows.some(r => r.direction === 'IN' && TERMINAL_ORD_STATUSES.has(r.ordStatus) &&
                         (r.clOrdId === clOrdId || r.origClOrdId === clOrdId));
}

async function doSend() {
    const errEl = document.getElementById('send-error');
    errEl.style.display = 'none';

    const params = {
        clOrdId:  document.getElementById('f-clordid').value,
        symbol:   document.getElementById('f-symbol').value,
        side:     document.getElementById('f-side').value,
        ordType:  document.getElementById('f-ordtype').value,
        qty:      document.getElementById('f-qty').value,
        price:    document.getElementById('f-price').value,
    };

    const data = await apiPost('/api/messages/send', params);
    if (data.error) {
        errEl.textContent = data.error;
        errEl.style.display = '';
    }
}

async function pollBlotter() {
    try {
        const rows = await apiGet('/api/messages');
        if (rows.length !== lastBlotterSize) {
            renderBlotter(rows);
            lastBlotterSize = rows.length;
        }
    } catch (e) {
        // ignore
    }
    setTimeout(pollBlotter, 1000);
}

function renderBlotter(rows) {
    const tbody = document.getElementById('blotter-body');
    tbody.innerHTML = '';
    for (const row of rows) {
        const tr = document.createElement('tr');

        if (row.direction === 'OUT') {
            tr.className = 'dir-out';
        } else if (row.direction === 'IN' && row.ordStatus) {
            const cls = ORD_STATUS_CLASS[row.ordStatus];
            if (cls) {
                tr.className = cls;
            }
        }

        const cells = [
            row.time, row.direction, row.seqNum,
            row.clOrdId, row.origClOrdId, row.orderId, row.execId,
            EXEC_TYPE_LABEL[row.execType] || row.execType,
            ORD_STATUS_LABEL[row.ordStatus] || row.ordStatus,
            rejectionReason(row),
            row.symbol, row.side,
            row.ordQty, row.price, row.ordType,
            row.cumQty, row.leavesQty,
        ];
        for (const val of cells) {
            const td = document.createElement('td');
            td.textContent = val || '';
            tr.appendChild(td);
        }

        const actionTd = document.createElement('td');
        if (row.direction === 'OUT' && !row.origClOrdId && !isOrderTerminal(rows, row.clOrdId)) {
            const btn = document.createElement('button');
            btn.textContent = 'Cancel';
            btn.onclick = () => prefillCancel(row.clOrdId, row.symbol, row.side, row.ordQty);
            actionTd.appendChild(btn);
        }
        tr.appendChild(actionTd);
        tbody.appendChild(tr);
    }

    const wrap = document.getElementById('blotter-wrap');
    wrap.scrollTop = wrap.scrollHeight;
}

async function doCancel() {
    const errEl = document.getElementById('cancel-error');
    errEl.style.display = 'none';

    const params = {
        origClOrdId: document.getElementById('c-origclordid').value,
        symbol:      document.getElementById('c-symbol').value,
        side:        document.getElementById('c-side').value,
        qty:         document.getElementById('c-qty').value,
    };

    const data = await apiPost('/api/messages/cancel', params);
    if (data.error) {
        errEl.textContent = data.error;
        errEl.style.display = '';
    }
}

const ORD_REJ_REASON_LABEL = {
    '0': 'BrokerOption', '1': 'UnknownSymbol', '2': 'ExchangeClosed',
    '3': 'ExceedsLimit', '4': 'TooLateToEnter', '5': 'UnknownOrder',
    '6': 'DuplicateOrder', '7': 'DuplicateVerbal', '8': 'StaleOrder', '99': 'Other',
};

const CXL_REJ_REASON_LABEL = {
    '0': 'TooLateToCancel', '1': 'UnknownOrder', '2': 'BrokerOption',
    '3': 'AlreadyPending', '4': 'MassCancelUnable', '5': 'OrigClOrdIdMismatch',
    '6': 'DuplicateClOrdId',
};

function rejectionReason(row) {
    if (row.ordRejReason) return ORD_REJ_REASON_LABEL[row.ordRejReason] || row.ordRejReason;
    if (row.cxlRejReason) return CXL_REJ_REASON_LABEL[row.cxlRejReason] || row.cxlRejReason;
    return '';
}

const SIDE_CHAR_TO_LABEL = {'1': 'Buy', '2': 'Sell', '5': 'Sell Short'};

function prefillCancel(clOrdId, symbol, side, qty) {
    document.getElementById('c-origclordid').value = clOrdId || '';
    document.getElementById('c-symbol').value = symbol || '';
    const sideLabel = SIDE_CHAR_TO_LABEL[side] || 'Buy';
    const sideSelect = document.getElementById('c-side');
    for (const opt of sideSelect.options) {
        opt.selected = (opt.value === sideLabel);
    }
    document.getElementById('c-qty').value = qty || '';
}

async function doClear() {
    await apiPost('/api/messages/clear', {});
    lastBlotterSize = 0;
    renderBlotter([]);
}

function setOrderControlsEnabled(loggedOn) {
    document.getElementById('btn-send').disabled        = !loggedOn;
    document.getElementById('btn-send-cancel').disabled = !loggedOn;
}

function pageInit() {
    // Apply current logon state immediately if the status poll has already run.
    const initial = window._lastSessionStatus;
    if (initial) {
        setOrderControlsEnabled(initial.loggedOn);
    }

    // Keep buttons in sync with every subsequent status poll.
    const originalUpdate = window.updateStatusStrip || function() {};
    window.updateStatusStrip = function(status) {
        originalUpdate(status);
        setOrderControlsEnabled(status.loggedOn);
    };

    pollBlotter();
}
</script>
</body>
</html>
