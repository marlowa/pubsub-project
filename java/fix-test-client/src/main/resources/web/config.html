<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIX Test Client — Config</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="content">
    <h1>Config</h1>
    <hr class="section-rule">

    <p style="margin-bottom:14px; color:#555;">
        Edit these files on disk and restart to apply changes.
    </p>

    <div class="config-file-label">app.toml</div>
    <hr style="border:none; border-top:1px solid #bbb; margin-bottom:6px;">
    <pre id="app-toml" class="config-file-content"></pre>

    <div class="config-file-label" style="margin-top:18px;">session.cfg</div>
    <hr style="border:none; border-top:1px solid #bbb; margin-bottom:6px;">
    <pre id="session-cfg" class="config-file-content"></pre>
</div>

<script src="/app.js"></script>
<script>
'use strict';

async function pageInit() {
    const data = await apiGet('/api/config');
    document.getElementById('app-toml').textContent = data.appToml || '';
    document.getElementById('session-cfg').textContent = data.sessionCfg || '';
}
</script>
</body>
</html>
