# environments/prod.toml
#
# Production deployment.  Each component runs on its own dedicated host.
# Fill in the actual hostnames/IPs for your environment before running
# deploy.py.  Lines marked REPLACE must be changed; all others are
# reasonable production defaults.
#
# Consumed by:
#   deploy.py --env environments/prod.toml --artefact pubsub-<ver>.tar.gz \
#             --install-dir /opt/pubsub

[env]
name        = "prod"
description = "Production deployment. One component per dedicated host."

# ── Paths ─────────────────────────────────────────────────────────────────────
# Absolute paths required for production.

[paths]
install_dir = "/opt/pubsub"         # binaries, component configs, certs
log_dir     = "/var/log/pubsub"     # component stdout/stderr and applog files
run_dir     = "/var/run/pubsub"     # PID files written here by devenv.py

# ── Database ──────────────────────────────────────────────────────────────────
# Password: set PUBSUB_APP_DB_PASSWORD in the environment before running
# deploy.py or devenv.py.

[db]
host = "db.exchange.internal"       # REPLACE
port = 5432
name = "pubsub"
user = "pubsub_app"

# ── High availability ─────────────────────────────────────────────────────────
# HA is always enabled in production.  The --no-ha flag to devenv.py is
# ignored when this is true (devenv.py checks this value first).

[ha]
enabled = true

# ── TLS certificates ──────────────────────────────────────────────────────────
# Currently only the authentication service admin channel uses TLS.
#
# In production: place certs issued by your CA at the paths shown below
# (relative to each component's working directory) before running deploy.py,
# then pass --skip-certs so deploy.py does not overwrite them with self-signed
# certificates.
#
# Set ca to the path of your CA certificate to enable client certificate
# verification on the admin channel.

[tls.auth_service_primary]
cert = "admin.crt"  # REPLACE with CA-signed cert
key  = "admin.key"  # REPLACE with private key
ca   = "ca.crt"     # REPLACE with CA cert, or "" to skip client cert verification

[tls.auth_service_secondary]
cert = "admin.crt"
key  = "admin.key"
ca   = "ca.crt"

# ── Components ────────────────────────────────────────────────────────────────
# Identical to dev.toml: binary/config structure does not change for production.

[startup_order]
components = [
    "auth_service_primary",
    "auth_service_secondary",
    "witness",
    "arbiter_primary",
    "arbiter_secondary",
    "matching_engine",
    "sequencer_primary",
    "sequencer_secondary",
    "order_gateway",
    "admin_service",
]

[components.auth_service_primary]
binary  = "bin/authentication_service"
config  = "etc/authentication_service/authentication_service.toml"
workdir = "etc/authentication_service"
ha_only = false

[components.auth_service_secondary]
binary  = "bin/authentication_service"
config  = "etc/authentication_service/authentication_service_secondary.toml"
workdir = "etc/authentication_service"
ha_only = true

[components.witness]
binary  = "bin/witness"
config  = "etc/witness/witness.toml"
workdir = "etc/witness"
ha_only = true

[components.arbiter_primary]
binary  = "bin/arbiter"
config  = "etc/arbiter/arbiter.toml"
workdir = "etc/arbiter"
ha_only = true

[components.arbiter_secondary]
binary  = "bin/arbiter"
config  = "etc/arbiter/arbiter_secondary.toml"
workdir = "etc/arbiter"
ha_only = true

[components.matching_engine]
binary  = "bin/matching_engine"
config  = "etc/matching_engine/matching_engine.toml"
workdir = "etc/matching_engine"
ha_only = false

[components.sequencer_primary]
binary  = "bin/sequencer"
config  = "etc/sequencer/sequencer.toml"
workdir = "etc/sequencer"
ha_only = false

[components.sequencer_secondary]
binary  = "bin/sequencer"
config  = "etc/sequencer/sequencer_secondary.toml"
workdir = "etc/sequencer"
ha_only = true

[components.order_gateway]
binary  = "bin/order_gateway"
config  = "etc/order_gateway/order_gateway.toml"
workdir = "etc/order_gateway"
ha_only = false

[components.admin_service]
jar     = "lib/admin-service.jar"
config  = "etc/admin_service/application.properties"
workdir = "etc/admin_service"
ha_only = false

# ── Template substitution values ──────────────────────────────────────────────
# deploy.py expands ${placeholder} in component config templates using these
# values.  Placeholder names are the full flattened TOML path of the value
# below: section + "_" + key, e.g. [arbiter_primary] peer_host → ${arbiter_primary_peer_host}.
#
# Listen hosts ("0.0.0.0") bind all interfaces on the component's host.
# Restrict to a specific interface IP if the host has multiple network
# interfaces and you want to isolate traffic.

[shared]
# false: CPU 0 is available for exclusive pinning on a properly isolated
# production machine.  Set to true only if CPU 0 is not isolated on your
# hardware.
reactor_cpu_pinning_reserve_cpu0   = false
reactor_cpu_registry_lock_file = "/dev/shm/pubsub_cpu_registry.lock"

[witness]
network_listen_host = "0.0.0.0"
network_listen_port = 7100

[arbiter_primary]
network_listen_host  = "0.0.0.0"
network_listen_port  = 7200
peer_listen_host     = "0.0.0.0"
peer_listen_port     = 7203
peer_host            = "arbiter-secondary.exchange.internal"  # REPLACE
peer_port            = 7204
peer_fence_file_path = "/dev/shm/arbiter_primary_fence"
witness_host         = "witness.exchange.internal"            # REPLACE
witness_port         = 7100

[arbiter_secondary]
network_listen_host  = "0.0.0.0"
network_listen_port  = 7201
peer_listen_host     = "0.0.0.0"
peer_listen_port     = 7204
peer_host            = "arbiter-primary.exchange.internal"    # REPLACE
peer_port            = 7203
peer_fence_file_path = "/dev/shm/arbiter_secondary_fence"
witness_host         = "witness.exchange.internal"            # REPLACE
witness_port         = 7100

[auth_service_primary]
network_listen_host  = "0.0.0.0"
network_listen_port  = 7070
admin_listen_port    = 7072

[auth_service_secondary]
network_listen_host  = "0.0.0.0"
network_listen_port  = 7071
admin_listen_port    = 7073

[matching_engine]
network_listen_host           = "0.0.0.0"
network_listen_port           = 7020
sequencer_er_host             = "sequencer-primary.exchange.internal"    # REPLACE
sequencer_er_port             = 7021
sequencer_er_secondary_host   = "sequencer-secondary.exchange.internal"  # REPLACE
sequencer_er_secondary_port   = 7022

[order_gateway]
network_listen_host                   = "0.0.0.0"
network_listen_port                   = 9879
network_er_listen_host                = "0.0.0.0"
network_er_listen_port                = 7010
authentication_service_host           = "auth-primary.exchange.internal"    # REPLACE
authentication_service_port           = 7070
authentication_service_secondary_host = "auth-secondary.exchange.internal"  # REPLACE
authentication_service_secondary_port = 7071
sequencer_primary_host                = "sequencer-primary.exchange.internal"    # REPLACE
sequencer_primary_port                = 7001
sequencer_secondary_host              = "sequencer-secondary.exchange.internal"  # REPLACE
sequencer_secondary_port              = 7002

[sequencer_primary]
network_listen_host        = "0.0.0.0"
network_listen_port        = 7001
network_er_listen_host     = "0.0.0.0"
network_er_listen_port     = 7021
gateway_host               = "gateway.exchange.internal"                 # REPLACE
gateway_port               = 7010
matching_engine_host       = "matching-engine.exchange.internal"         # REPLACE
matching_engine_port       = 7020
ha_arbiter_primary_host    = "arbiter-primary.exchange.internal"         # REPLACE
ha_arbiter_primary_port    = 7200
ha_arbiter_secondary_host  = "arbiter-secondary.exchange.internal"       # REPLACE
ha_arbiter_secondary_port  = 7201
peer_listen_host           = "0.0.0.0"
peer_listen_port           = 7003
peer_host                  = "sequencer-secondary.exchange.internal"     # REPLACE
peer_port                  = 7004
peer_fence_file_path       = "/dev/shm/sequencer_primary_fence"
wal_directory              = "/var/lib/pubsub/sequencer_wal"
wal_subscriber_listen_host = "0.0.0.0"
wal_subscriber_listen_port = 7030

[sequencer_secondary]
network_listen_host        = "0.0.0.0"
network_listen_port        = 7002
network_er_listen_host     = "0.0.0.0"
network_er_listen_port     = 7022
gateway_host               = "gateway.exchange.internal"                 # REPLACE
gateway_port               = 7010
matching_engine_host       = "matching-engine.exchange.internal"         # REPLACE
matching_engine_port       = 7020
ha_arbiter_primary_host    = "arbiter-primary.exchange.internal"         # REPLACE
ha_arbiter_primary_port    = 7200
ha_arbiter_secondary_host  = "arbiter-secondary.exchange.internal"       # REPLACE
ha_arbiter_secondary_port  = 7201
peer_listen_host           = "0.0.0.0"
peer_listen_port           = 7004
peer_host                  = "sequencer-primary.exchange.internal"       # REPLACE
peer_port                  = 7003
peer_fence_file_path       = "/dev/shm/sequencer_secondary_fence"
wal_directory              = "/var/lib/pubsub/sequencer_secondary_wal"
wal_subscriber_listen_host = "0.0.0.0"
wal_subscriber_listen_port = 7031

# ── Admin service ──────────────────────────────────────────────────────────────
# auth_service_admin_port must match auth_service_primary.admin_listen_port above.
# db_url must reference the same host/port/name as the [db] section above.

[admin_service]
db_url                  = "jdbc:postgresql://db.exchange.internal:5432/pubsub"  # REPLACE
auth_service_host       = "auth-primary.exchange.internal"  # REPLACE
auth_service_admin_port = 7072
server_port             = 8080
