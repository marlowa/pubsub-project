[network]
listen_host         = "127.0.0.1"
listen_port         = 9879
raw_buffer_capacity = 4194304 # for TCP buffering; 4 MiB per FIX session.
                              # At ~175 bytes/NOS, 4 MiB holds ~24,000 messages at the high-water
                              # mark (75%), far more than any single session's burst (10,000 max).
                              # This prevents TCP flow-control backpressure being applied to fix8,
                              # which loses one order per session when its send is blocked for >100ms.
er_listen_host      = "127.0.0.1"
er_listen_port      = 7010

[authentication_service]
host          = "127.0.0.1"
port          = 7070
scram_password = "stubpassword"

[sequencer]
ha_enabled      = true
primary_host    = "127.0.0.1"
primary_port    = 7001
secondary_host  = "127.0.0.1"
secondary_port  = 7002

[fix_session]
sender_comp_id         = "GATEWAY"
default_target_comp_id = "CLIENT"

[timeouts]
logon_timeout = "30s"

[logging]
applog_level = "info"
syslog_level = "critical"
mode = "none"
max_file_size = 10240000
max_backup_files=10
[reactor]
cpu_pinning_enabled = true
cpu_pinning_dev_mode = true
cpu_registry_lock_file = "/dev/shm/pubsub_cpu_registry.lock"

[event_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
# Previous peak 21,504; still exhausted at 22,528 once full pipeline active.
# Doubled to 45,056 for headroom.
objects_per_slab = 45056
initial_slabs    = 1

[command_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
# 62 slabs × 1024 base + 253 exhaustion chains × 1024 = 322,560; rounded to 327,680.
objects_per_slab = 327680
initial_slabs    = 1

