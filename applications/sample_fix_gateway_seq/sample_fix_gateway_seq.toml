[network]
listen_host         = "127.0.0.1"
listen_port         = 9879
raw_buffer_capacity = 512000 # for TCP buffering
er_listen_host      = "127.0.0.1"
er_listen_port      = 7010

[sequencer]
ha_enabled      = true
primary_host    = "127.0.0.1"
primary_port    = 7001
secondary_host  = "127.0.0.1"
secondary_port  = 7002

[fix_session]
sender_comp_id         = "GATEWAY"
default_target_comp_id = "CLIENT"

[timeouts]
logon_timeout = "30s"

[logging]
applog_level = "debug"
syslog_level = "info"
mode = "none"
max_file_size = 10240000
max_backup_files=10
[reactor]
cpu_pinning_enabled = true
cpu_pinning_dev_mode = true
cpu_registry_lock_file = "/dev/shm/pubsub_cpu_registry.lock"
