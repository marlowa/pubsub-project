[network]
listen_host         = "${order_gateway_network_listen_host}"
listen_port         = 9879
raw_buffer_capacity = 16777216 # for TCP buffering; 16 MiB per FIX session.
                              # At ~175 bytes/NOS, 16 MiB holds ~71,900 messages at the 75%
                              # high-water mark — above the 50,000 NOS per session sent by the
                              # standard 20-client × 50-burst perf test.  The previous 4 MiB
                              # value (~24,000 messages at 75%) triggered read backpressure on
                              # all sessions under that load, causing fix8 to reset connections
                              # when the burst was higher (5×200 = 200K NOS/session).
                              # Note: 5×200 still exceeds this buffer (200K > 71K); that
                              # configuration is beyond the supported per-session burst size.
er_listen_host      = "${order_gateway_network_er_listen_host}"
er_listen_port      = 7010

[authentication_service]
host           = "${order_gateway_authentication_service_host}"
port           = 7070
secondary_host = "${order_gateway_authentication_service_secondary_host}"
secondary_port = 7071
scram_password = "${order_gateway_authentication_service_scram_password}"

[sequencer]
ha_enabled      = true
primary_host    = "${order_gateway_sequencer_primary_host}"
primary_port    = 7001
secondary_host  = "${order_gateway_sequencer_secondary_host}"
secondary_port  = 7002

[fix_session]
sender_comp_id         = "GATEWAY"
default_target_comp_id = "CLIENT"

[timeouts]
logon_timeout      = "30s"
scram_auth_timeout = "10s"

[logging]
applog_level     = "info"
syslog_level     = "critical"
mode             = "none"
max_file_size    = 10240000
max_backup_files = 10

[reactor]
cpu_pinning_enabled    = true
cpu_pinning_reserve_cpu0   = ${shared_reactor_cpu_pinning_reserve_cpu0}
cpu_registry_lock_file = "${shared_reactor_cpu_registry_lock_file}"
connect_retry_warning_interval = "15m"

[event_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
# Previous peak 21,504; still exhausted at 22,528 once full pipeline active.
# Doubled to 45,056 for headroom.
# A heavy perf test of a million orders caused this to be increased again, to xxxxx
objects_per_slab = 80000
initial_slabs    = 1

[command_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
# 62 slabs × 1024 base + 253 exhaustion chains × 1024 = 322,560; rounded to 327,680.
# A heavy perf test of a million orders caused this to be increased again, to 1,000,000
objects_per_slab = 1000000
initial_slabs    = 1

[fix_capture]
# Set enabled=true to write all inbound and outbound FIX wire bytes to a binary file.
# The file is truncated on each gateway start.  Record format (little-endian):
#   uint32_t payload_size | int64_t timestamp_ns | uint8_t direction(0=in,1=out) | bytes
enabled     = false
file        = "${order_gateway_fix_capture_file}"
queue_depth = ${order_gateway_fix_capture_queue_depth}
