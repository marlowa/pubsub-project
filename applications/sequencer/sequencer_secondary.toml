[network]
listen_host    = "127.0.0.1"
listen_port    = 7002
er_listen_host = "127.0.0.1"
er_listen_port = 7022

[gateway]
host = "127.0.0.1"
port = 7010

[matching_engine]
host = "127.0.0.1"
port = 7020

[ha]
instance_id  = 2
arbiter_host = "127.0.0.1"
arbiter_port = 7100

[peer]
listen_host                = "127.0.0.1"
listen_port                = 7004
host                       = "127.0.0.1"
port                       = 7003
heartbeat_interval_seconds = 5
heartbeat_timeout_seconds  = 15
