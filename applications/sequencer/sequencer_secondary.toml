[network]
listen_host    = "127.0.0.1"
listen_port    = 7002
er_listen_host = "127.0.0.1"
er_listen_port = 7022

[gateway]
host = "127.0.0.1"
port = 7010

[matching_engine]
host = "127.0.0.1"
port = 7020

[ha]
ha_enabled                  = true
instance_id                 = 2
arbiter_primary_host        = "127.0.0.1"
arbiter_primary_port        = 7200
arbiter_secondary_host      = "127.0.0.1"
arbiter_secondary_port      = 7201
arbitration_timeout_seconds = 3

[peer]
listen_host                = "127.0.0.1"
listen_port                = 7004
host                       = "127.0.0.1"
port                       = 7003
heartbeat_interval_seconds = 5
heartbeat_timeout_seconds = 15
startup_election_timeout_seconds = 20
fence_file_path = "/dev/shm/sequencer_secondary_fence"

[wal]
directory                 = "/var/tmp/pubsub/sequencer_secondary_wal"
segment_size              = 4194304
snapshot_interval_seconds = 30

[logging]
applog_level = "warning"
syslog_level = "critical"

[reactor]
cpu_pinning_enabled = true
cpu_pinning_dev_mode = true
cpu_registry_lock_file = "/dev/shm/pubsub_cpu_registry.lock"

[event_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
# 20 slabs × 4096 = 81,920 objects; never exhausted.
objects_per_slab = 81920
initial_slabs    = 1

[command_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
# 130 slabs × 4096 = 532,480 objects; never exhausted.
objects_per_slab = 532480
initial_slabs    = 1

