[network]
listen_host    = "${sequencer_secondary_network_listen_host}"
listen_port    = ${sequencer_secondary_network_listen_port}
er_listen_host = "${sequencer_secondary_network_er_listen_host}"
er_listen_port = ${sequencer_secondary_network_er_listen_port}

[gateway]
host = "${sequencer_secondary_gateway_host}"
port = ${sequencer_secondary_gateway_port}

[matching_engine]
host = "${sequencer_secondary_matching_engine_host}"
port = ${sequencer_secondary_matching_engine_port}

[ha]
ha_enabled                  = true
instance_id                 = 2
arbiter_primary_host        = "${sequencer_secondary_ha_arbiter_primary_host}"
arbiter_primary_port        = ${sequencer_secondary_ha_arbiter_primary_port}
arbiter_secondary_host      = "${sequencer_secondary_ha_arbiter_secondary_host}"
arbiter_secondary_port      = ${sequencer_secondary_ha_arbiter_secondary_port}
arbitration_timeout_seconds = 3

[peer]
listen_host                      = "${sequencer_secondary_peer_listen_host}"
listen_port                      = ${sequencer_secondary_peer_listen_port}
host                             = "${sequencer_secondary_peer_host}"
port                             = ${sequencer_secondary_peer_port}
heartbeat_interval_seconds       = 2
heartbeat_timeout_seconds        = 6
startup_election_timeout_seconds = 20
fence_file_path                  = "${sequencer_secondary_peer_fence_file_path}"

[wal_subscriber]
listen_host = "${sequencer_secondary_wal_subscriber_listen_host}"
listen_port = ${sequencer_secondary_wal_subscriber_listen_port}

[wal]
directory                 = "${sequencer_secondary_wal_directory}"
segment_size              = 4194304
snapshot_interval_seconds = 30

[logging]
applog_level = "info"
syslog_level = "critical"

[reactor]
cpu_pinning_enabled    = true
cpu_pinning_reserve_cpu0   = ${shared_reactor_cpu_pinning_reserve_cpu0}
cpu_registry_lock_file = "${shared_reactor_cpu_registry_lock_file}"
connect_retry_warning_interval = "15m"

[event_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
# 20 slabs × 4096 = 81,920 objects; never exhausted.
objects_per_slab = 81920
initial_slabs    = 1

[command_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
# 130 slabs × 4096 = 532,480 objects; never exhausted.
objects_per_slab = 532480
initial_slabs    = 1
