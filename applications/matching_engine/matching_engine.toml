[network]
listen_host = "127.0.0.1"
listen_port = 7020

[sequencer_er]
host = "127.0.0.1"
port = 7021

[logging]
applog_level = "info"
syslog_level = "critical"

[reactor]
cpu_pinning_enabled = true
cpu_pinning_dev_mode = true
cpu_registry_lock_file = "/dev/shm/pubsub_cpu_registry.lock"

[event_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
objects_per_slab = 10240
initial_slabs    = 1

[command_queue_pool]
# Single pre-allocated pool sized for observed peak (50 clients, burst=10).
# 216 slabs × 1024 base + 100 exhaustion chains × 1024 = 323,584; rounded to 327,680.
objects_per_slab = 327680
initial_slabs    = 1

