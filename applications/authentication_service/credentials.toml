# SCRAM-SHA-256 credentials for the authentication service.
#
# Each [[credential]] entry contains the pre-derived values for one comp_id.
# The plaintext password is NOT stored.  Fields:
#
#   comp_id    -- identity string sent in AuthenticationRequest
#   stored_key -- hex-encoded SHA-256(HMAC-SHA-256(SaltedPassword, "Client Key")), 64 hex chars
#   server_key -- hex-encoded HMAC-SHA-256(SaltedPassword, "Server Key"),          64 hex chars
#   salt       -- hex-encoded random salt used during PBKDF2 derivation,           32 hex chars
#   iterations -- PBKDF2 iteration count used during derivation
#
# All entries below were derived from password "stubpassword" using the fixed
# development salt 0102...10 at 4096 iterations.  Replace with real values
# before deploying to production.

