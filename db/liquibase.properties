# Liquibase connection properties for the pubsub database.
#
# Used when running the liquibase CLI directly (e.g. 'liquibase status',
# 'liquibase update', 'liquibase rollback', etc.).  Run these commands from
# the db/ directory so that this file is picked up automatically, or pass
# '--defaults-file=db/liquibase.properties' from the project root.
#
# The password is read from the PUBSUB_APP_DB_PASSWORD environment variable.
# Set it before running any liquibase command:
#     export PUBSUB_APP_DB_PASSWORD=pubsub_dev
#
# To initialise the database from scratch use:
#     python3 db/create_db.py [--drop-existing]

url           = jdbc:postgresql://localhost:5432/pubsub
username      = pubsub_app
password      = ${env.PUBSUB_APP_DB_PASSWORD}

# Liquibase 5.x resolves changeLogFile relative to searchPath.
# Run liquibase commands from the db/ directory so that '.' is correct here.
searchPath    = .
changeLogFile = changelog/db.changelog-root.xml

# The PostgreSQL JDBC driver must be on Liquibase's classpath.
# Easiest: place it in /opt/liquibase/lib/ (auto-loaded).
# Alternative: export LIQUIBASE_CLASSPATH=/usr/share/java/postgresql.jar
# before running any liquibase command from this directory.
